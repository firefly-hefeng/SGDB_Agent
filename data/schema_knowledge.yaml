query_constraints:
- Always add LIMIT (default 20, max 200)
- Use LIKE '%term%' for text fields (tissue, disease, cell_type)
- Use IN for enumerated fields (source_database, sex_normalized, organism, tissue_system, disease_category, sample_type, dev_stage_category, ancestry_category)
- Parameterize all user values with ?
- 'FTS5 tables available: fts_samples, fts_projects, fts_series'
- Use v_sample_with_hierarchy view for joined queries (samples+series+projects)
- cell_type is NOT available in v_sample_with_hierarchy — query unified_samples directly
- 'In v_sample_with_hierarchy: pk→sample_pk, source_database→sample_source, title→project_title'
- Do NOT combine tissue + tissue_general in same WHERE clause
- 'Standardized fields available: tissue_standard, tissue_standard_l1, tissue_standard_leaf, tissue_system, disease_standard, disease_standard_l1, disease_category, cell_type_standard, cell_type_lineage, organism_normalized, organism_common, sex_normalized, sample_type, age_numeric_min, age_unit_normalized, dev_stage_category, ancestry_category'
- 'For tissue: filter equality on tissue_standard (627 vals, indexed). For broad grouping/faceting use tissue_standard_l1 (70 organ-level vals) or tissue_system (17 categories). For specific drill-down use tissue_standard_leaf (412 vals).'
- 'For disease: filter equality on disease_standard (721 vals). For broad grouping use disease_category (17 vals) or disease_standard_l1 (31 disease-family vals).'
- 'For cell_type: filter on cell_type_standard (336 vals); for broad lineage grouping use cell_type_lineage (18 vals).'
- 'Never group / facet on tissue_standard or cell_type_standard directly — they mix granularity tiers. Use the _l1 / _leaf / _lineage variants.'
- 'On unified_projects and unified_series, the raw organism column is CORRUPTED (Python list-literal strings); use primary_organism instead. unified_samples.organism is clean.'
- 'sample_type distinguishes: primary_tissue, tumor, cell_line, iPSC_derived, organoid, xenograft, PSC_derived, in_vitro_other, unknown (9 values, 100% coverage).'
- 'organism_common provides common names: human, mouse, zebrafish, fruit fly (35 vals).'
- 'For age range queries use the numeric pair (age_numeric_min, age_numeric_max) + age_unit_normalized, not the raw age column.'
- 'For sex filtering use sex_normalized (female/male/mixed/unknown), not raw sex (97 dirty values).'
overrides:
  synonyms: {}
  notes: {}
